# ESP-NOW switch sync — Node A
#
# Use case: two physical switches controlling the same logical state.
# Node A and Node B share a binary state. When one turns on/off, the other follows.
#
# Setup:
#   1. Flash discover_mac.yaml to BOTH devices, note their MAC addresses.
#   2. Replace PEER_MAC_B below with Node B's actual MAC.
#   3. Replace PEER_MAC_A in node_b.yaml with Node A's actual MAC.
#   4. Flash this file to Node A, node_b.yaml to Node B.
#
# Board notes:
#   NodeMCU v2 / Wemos D1 mini: board: nodemcuv2, led_pin: GPIO2 (active-low)
#   Sonoff Basic R2:             board: esp8285,  relay_pin: GPIO12, btn: GPIO0
#   Sonoff TX T1 1-gang:         board: esp8285,  relay_pin: GPIO12, btn: GPIO0

substitutions:
  device_name: espnow-node-a
  peer_mac_b: "AA:BB:CC:DD:EE:02"   # ← replace with Node B's MAC

esphome:
  name: ${device_name}

esp8266:
  board: nodemcuv2          # ← change for your hardware
  framework:
    type: arduino

external_components:
  - source:
      type: local
      path: ../components   # relative to this file → repo/components/
    components: [espnow]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} AP"

captive_portal:

logger:
  level: DEBUG              # DEBUG shows ESP-NOW TX/RX in the log

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# ── ESP-NOW ────────────────────────────────────────────────────────────────────

espnow:
  channel: 0                # inherit channel from wifi: (correct for STA mode)
  peers:
    - mac: ${peer_mac_b}
      id: node_b
  on_receive:
    address: node_b         # only handle frames from Node B
    then:
      - if:
          condition:
            lambda: "return data[0] != 0;"
          then:
            - switch.turn_on: my_switch
          else:
            - switch.turn_off: my_switch

# ── Switch ─────────────────────────────────────────────────────────────────────
#
# Using platform: template + optimistic: true so the switch works without a relay.
# Replace with platform: gpio + pin: GPIO12 for Sonoff devices.

switch:
  - platform: template
    name: "Node A switch"
    id: my_switch
    optimistic: true
    on_turn_on:
      - logger.log: "A: turned ON — sending to B"
      - espnow.send:
          peer: node_b
          payload: [0x01]
          wait_for_sent: false
    on_turn_off:
      - logger.log: "A: turned OFF — sending to B"
      - espnow.send:
          peer: node_b
          payload: [0x00]
          wait_for_sent: false

# Uncomment to use a physical GPIO switch (Sonoff TX):
