# Step 1: flash this to EACH device to discover its MAC address.
#
# After boot, look in the log for a line like:
#   [I][wifi:...]  Connected to "your-ssid" (MAC: AA:BB:CC:DD:EE:FF)
# Note that MAC address — you'll need it for node_a.yaml / node_b.yaml.
#
# Board notes:
#   NodeMCU v2 / Wemos D1 mini: board: nodemcuv2
#   Sonoff Basic / TX (ESP8285): board: esp8285
#   Generic 4MB ESP8266:        board: esp12e

substitutions:
  device_name: espnow-discover

esphome:
  name: ${device_name}

esp8266:
  board: nodemcuv2          # ← change for your hardware

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} AP"

captive_portal:

logger:
  level: INFO

api:

ota:
  - platform: esphome
